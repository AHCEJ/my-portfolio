[phases.setup]
nixPkgs = ["php82", "php82Extensions.mbstring", "php82Extensions.xml", "php82Extensions.tokenizer", "php82Extensions.ctype", "php82Extensions.fileinfo", "php82Extensions.openssl", "php82Extensions.pdo", "composer", "apacheHttpd"]

[phases.build]
cmds = ["composer install --no-dev --optimize-autoloader", "cp .env.example .env || true", "php artisan key:generate --force"]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"